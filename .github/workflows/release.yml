name: Release

on:
  push:
    tags:
      - "v*"

jobs:
  build:
    name: Build & Release
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.21"

      - name: Build binaries
        run: |
          GOOS=darwin  GOARCH=arm64  go build -ldflags="-s -w -X main.version=${{ github.ref_name }}" -o dist/folgo-darwin-arm64   ./cmd/folgo
          GOOS=darwin  GOARCH=amd64  go build -ldflags="-s -w -X main.version=${{ github.ref_name }}" -o dist/folgo-darwin-amd64   ./cmd/folgo
          GOOS=linux   GOARCH=amd64  go build -ldflags="-s -w -X main.version=${{ github.ref_name }}" -o dist/folgo-linux-amd64    ./cmd/folgo
          GOOS=windows GOARCH=amd64  go build -ldflags="-s -w -X main.version=${{ github.ref_name }}" -o dist/folgo-windows-amd64.exe ./cmd/folgo

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
          generate_release_notes: true
